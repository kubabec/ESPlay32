[env:esp32doit-devkit-v1]
platform = espressif32@6.6.0
board = esp32doit-devkit-v1
framework = arduino

; ===== Monitor =====
monitor_speed = 115200

; ===== Build flags =====
build_flags =
  -Iinclude
  -Isrc
  -Iw

; ===== Biblioteki =====
lib_deps =
  FS
  SPIFFS

; ===== System plików =====
board_build.filesystem = spiffs

; ===== Stabilność WiFi + flash =====
board_build.flash_mode = dio
board_build.f_cpu = 240000000L